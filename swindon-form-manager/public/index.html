<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - 7th Swindon Form Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-nav" class="app-nav"></header>
  <div class="container">
    <div class="card">
      <h1>Dashboard</h1>
      <p class="muted" id="intro-text"></p>
      <a class="btn btn-primary" id="new-request-btn" href="new-request.html" style="display:none">+ New activity approval request</a>
    </div>

    <div class="tabs" id="tabs" style="display:none">
      <button data-tab="mine" class="active">My requests</button>
      <button data-tab="pending">Awaiting my approval</button>
    </div>

    <div class="card">
      <div id="mine-panel"></div>
      <div id="pending-panel" style="display:none"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
