<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Career Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-nav" class="app-nav"></header>
  <div class="container">
    <div class="card">
      <h1>Administration</h1>
    </div>

    <div class="tabs" id="admin-tabs">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="roles">Role profiles</button>
      <button data-tab="skills">SFIA skills</button>
      <button data-tab="learning">Learning resources</button>
      <button data-tab="pathways">Career pathways</button>
      <button data-tab="review">Content review</button>
      <button data-tab="audit">Audit log</button>
      <button data-tab="endusers">End users</button>
      <button data-tab="interview">Interview questions</button>
      <button data-tab="businessroles">Business roles</button>
      <button data-tab="packbuilder">Pack builder</button>
      <button data-tab="orginsights">Org insights</button>
      <button data-tab="users" id="users-tab-btn" style="display:none">Admin users</button>
    </div>

    <div id="tab-content"></div>
  </div>

  <div id="modal-root"></div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
