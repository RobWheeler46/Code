<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change password - Career Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-nav" class="app-nav"></header>
  <div class="container narrow">
    <div class="card" style="max-width:460px; margin:2rem auto;">
      <h1>Change password</h1>
      <p class="muted">Use this screen to update the password for your account.</p>
      <div id="alert-box"></div>
      <form id="cp-form">
        <div class="field">
          <label for="current">Current password</label>
          <input type="password" id="current" name="current" required autocomplete="current-password">
        </div>
        <div class="field">
          <label for="new">New password</label>
          <input type="password" id="new" name="new" required autocomplete="new-password">
        </div>
        <div class="field">
          <label for="confirm">Confirm new password</label>
          <input type="password" id="confirm" name="confirm" required autocomplete="new-password">
        </div>
        <div class="card" style="background:var(--sky); box-shadow:none; margin:0 0 1rem;">
          <p style="margin:0 0 0.4rem; font-weight:600;">Your password must be:</p>
          <ul id="rules-list" class="muted" style="margin:0; padding-left:1.2rem; font-size:0.88rem;"><li>Loading rules…</li></ul>
        </div>
        <div class="actions-row" style="margin-top:0;">
          <button class="btn btn-primary" type="submit" id="cp-submit">Update password</button>
          <a class="btn btn-secondary" id="cp-cancel" href="dashboard.html">Cancel</a>
        </div>
      </form>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/change-password.js"></script>
</body>
</html>
