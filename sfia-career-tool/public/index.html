<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Career Explorer - Explore roles and plan your growth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-nav" class="app-nav"></header>

  <div id="home-hero"></div>

  <div class="container">
    <div id="action-grid"></div>

    <div class="filters-row">
      <div class="field">
        <label for="family-filter">Role family</label>
        <select id="family-filter"><option value="">All role families</option></select>
      </div>
      <div class="field">
        <label for="area-filter">Capability area</label>
        <select id="area-filter"><option value="">All capability areas</option></select>
      </div>
      <div class="field" style="flex:0;">
        <button class="btn btn-secondary" id="clear-filters" type="button">Clear</button>
      </div>
    </div>

    <h2 id="roles-heading">Featured roles</h2>
    <div id="role-list"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
