<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign in - Career Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-nav" class="app-nav"></header>
  <div class="container narrow">
    <div class="card" style="max-width:420px; margin:2rem auto;">
      <h1>Sign in</h1>
      <p class="muted">Sign in to save roles and comparisons to your personal dashboard. Accounts are created by an administrator &mdash; if you don't have one, ask your admin to invite you.</p>
      <div id="alert-box"></div>
      <form id="signin-form">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%">Sign in</button>
      </form>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderPublicNav();
    document.getElementById('signin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById('alert-box');
      alertBox.innerHTML = '';
      try {
        await Api.post('/api/login', {
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        });
        const params = new URLSearchParams(location.search);
        location.href = params.get('next') || 'dashboard.html';
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
      }
    });
  </script>
</body>
</html>
