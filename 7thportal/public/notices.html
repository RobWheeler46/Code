<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notices - 7thPortal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-nav" class="app-nav"></header>

  <div class="container narrow">
    <h1>Notices</h1>
    <div id="content"><p class="muted">Loading&hellip;</p></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    (async () => {
      const me = await requireUserNav();
      if (!me) return;
      const content = document.getElementById('content');
      try {
        const notices = await Api.get('/api/notices');
        content.innerHTML = notices.length === 0 ? '<p class="muted">No current notices.</p>' : notices.map(n => `
          <div class="card notice-card">
            <div class="date">${formatDate(n.startDate)}${n.endDate ? ' - ' + formatDate(n.endDate) : ''}${n.sectionName ? ' &middot; ' + escapeHtml(n.sectionName) : ''}</div>
            <strong>${escapeHtml(n.title)}</strong>
            <p style="margin:0.4rem 0 0;">${escapeHtml(n.body)}</p>
          </div>
        `).join('');
      } catch (err) {
        content.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
