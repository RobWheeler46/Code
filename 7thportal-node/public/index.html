<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7thPortal — 7th Swindon Scout Group</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="centered">
    <div class="card auth-card pad-lg" style="text-align:center">
      <div class="brand-big" style="justify-content:center">
        <span class="logo">7</span>
        <div style="text-align:left">
          <div style="font-weight:800;font-size:1.2rem">7thPortal</div>
          <div class="muted small">7th Swindon Scout Group</div>
        </div>
      </div>
      <p class="muted" style="margin:16px 0 22px">
        The group portal for parents and leaders — child information, group notices
        and the leader document library, in one place.
      </p>
      <a class="btn" href="/login" style="width:100%">Sign in</a>
      <p class="hint" style="margin-top:16px">
        Parents sign in with the account the group issues. Leaders sign in with OSM.
      </p>
    </div>
  </div>
</body>
</html>
