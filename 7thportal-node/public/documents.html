<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document library — 7thPortal</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="topbar" class="topbar"></header>
  <main class="wrap">
    <div class="page-head" style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap">
      <div style="flex:1">
        <h1>Document library</h1>
        <p>Leader-only policies, processes, templates and guidance.</p>
      </div>
      <button class="btn" id="newBtn">Upload document</button>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="row">
        <div><input id="search" placeholder="Search documents…"></div>
        <div style="flex:0 0 220px"><select id="category"><option value="">All categories</option></select></div>
      </div>
    </div>

    <div id="list" class="grid cols-2"></div>
  </main>
  <script src="/js/app.js"></script>
  <script src="/js/documents.js"></script>
</body>
</html>
