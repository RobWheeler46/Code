<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Detail - Market Research Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-nav" id="app-nav"></header>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:start">
      <div>
        <h1 id="asset-title"></h1>
        <p class="muted" id="asset-subtitle"></p>
      </div>
      <button class="btn btn-secondary" id="refresh-btn">Refresh now</button>
    </div>
    <div id="stale-warning"></div>

    <div class="grid cols-4" id="stat-tiles"></div>

    <div class="card">
      <h2>Price Chart (last 90 days)</h2>
      <canvas id="sparkline" width="1000" height="200" style="width:100%; height:200px"></canvas>
    </div>

    <div class="grid cols-2">
      <div class="card">
        <h2>Technical Indicators</h2>
        <div id="indicators"></div>
      </div>
      <div class="card">
        <h2>Risk Flags</h2>
        <div id="risk-flags"></div>
        <h3>Research Status</h3>
        <select id="research-status">
          <option value="not_reviewed">Not reviewed</option>
          <option value="watching">Watching</option>
          <option value="researching">Researching</option>
          <option value="interested">Interested</option>
          <option value="holding">Holding</option>
          <option value="sold">Sold</option>
          <option value="avoiding">Avoiding</option>
          <option value="archived">Archived</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h2>Active Signals</h2>
      <div id="active-signals"></div>
    </div>

    <div class="card">
      <h2>Signal History</h2>
      <div id="historical-signals"></div>
    </div>

    <div class="card">
      <h2>Notes</h2>
      <form id="note-form">
        <div class="field">
          <textarea id="note-text" placeholder="Add a research note..."></textarea>
        </div>
        <div class="field">
          <input type="text" id="note-tags" placeholder="Tags, comma separated (e.g. watching, momentum)">
        </div>
        <button class="btn btn-primary" type="submit">Add Note</button>
      </form>
      <div id="notes-list"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/asset.js"></script>
</body>
</html>
