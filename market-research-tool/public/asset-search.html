<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Search - Market Research Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-nav" id="app-nav"></header>
  <div class="container">
    <h1>Asset Search</h1>
    <div class="card">
      <div class="grid cols-2">
        <div class="field">
          <label for="search-input">Search US shares, UK shares or crypto</label>
          <input type="search" id="search-input" placeholder="e.g. AAPL, Vodafone, Bitcoin">
        </div>
        <div class="field">
          <label for="watchlist-select">Add to watchlist</label>
          <select id="watchlist-select"></select>
        </div>
      </div>
      <div id="search-results"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/asset-search.js"></script>
</body>
</html>
